name: Brasileirão Pipeline

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

run: |
    pip install playwright==1.44.0
    playwright install chromium
    sudo apt-get install -y \
      libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
      libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
      libxdamage1 libxfixes3 libxrandr2 libgbm1 \
      libnss3 libpango-1.0-0 libcairo2

      - name: Rodar pipeline
        env:
          DB_HOST:     ${{ secrets.DB_HOST }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_PORT:     ${{ secrets.DB_PORT }}
        run: python scheduler.py --run-now

      - name: Preparar pasta para Pages
        run: |
          mkdir -p public
          cp brasileirao_dashboard.html public/index.html
          [ -f dados_processados/probabilidades.csv ] && cp dados_processados/probabilidades.csv public/probabilidades.csv || echo "probabilidades.csv não encontrado, pulando"

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
